<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F7B6C"/>
      <stop offset="100%" style="stop-color:#065a4f"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grille sudoku stylisée -->
  <g transform="translate(700, 80)" opacity="0.15">
    <rect width="420" height="420" rx="12" fill="none" stroke="white" stroke-width="3"/>
    <line x1="140" y1="0" x2="140" y2="420" stroke="white" stroke-width="3"/>
    <line x1="280" y1="0" x2="280" y2="420" stroke="white" stroke-width="3"/>
    <line x1="0" y1="140" x2="420" y2="140" stroke="white" stroke-width="3"/>
    <line x1="0" y1="280" x2="420" y2="280" stroke="white" stroke-width="3"/>
    <line x1="47" y1="0" x2="47" y2="420" stroke="white" stroke-width="1" opacity="0.5"/>
    <line x1="94" y1="0" x2="94" y2="420" stroke="white" stroke-width="1" opacity="0.5"/>
    <line x1="187" y1="0" x2="187" y2="420" stroke="white" stroke-width="1" opacity="0.5"/>
    <line x1="234" y1="0" x2="234" y2="420" stroke="white" stroke-width="1" opacity="0.5"/>
    <line x1="327" y1="0" x2="327" y2="420" stroke="white" stroke-width="1" opacity="0.5"/>
    <line x1="374" y1="0" x2="374" y2="420" stroke="white" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Titre -->
  <text x="80" y="200" font-family="Georgia, serif" font-size="88" font-weight="bold" fill="white">Sudoku Art</text>
  
  <!-- Sous-titre -->
  <text x="82" y="280" font-family="Arial, sans-serif" font-size="36" fill="rgba(255,255,255,0.85)">Résous la grille, révèle une œuvre d'art</text>

  <!-- Badges -->
  <rect x="82" y="330" width="160" height="48" rx="24" fill="rgba(255,255,255,0.2)"/>
  <text x="162" y="362" font-family="Arial, sans-serif" font-size="22" fill="white" text-anchor="middle">🖼️ Art</text>
  
  <rect x="260" y="330" width="200" height="48" rx="24" fill="rgba(255,255,255,0.2)"/>
  <text x="360" y="362" font-family="Arial, sans-serif" font-size="22" fill="white" text-anchor="middle">📷 Memories</text>
  
  <rect x="478" y="330" width="160" height="48" rx="24" fill="rgba(255,255,255,0.2)"/>
  <text x="558" y="362" font-family="Arial, sans-serif" font-size="22" fill="white" text-anchor="middle">🎯 Défi</text>

  <!-- URL -->
  <text x="82" y="560" font-family="Arial, sans-serif" font-size="28" fill="rgba(255,255,255,0.6)">sudoku-art.vercel.app</text>
</svg>